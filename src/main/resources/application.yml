spring:
  application:
    name: distributed-banking-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/banking
    username: banking
    password: banking
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-chars}
    expiration-ms: 86400000

logging:
  level:
    org.springframework.security: INFO
    com.mikaelrehman.banking: DEBUG
